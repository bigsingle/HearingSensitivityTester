<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Sensitivity Tester</title>
    <style>
        :root { --accent: #00ffcc; --error: #ff4444; --bg: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        .container { width: 95%; max-width: 500px; text-align: center; padding: 20px; }
        h1 { color: var(--accent); font-size: 1.5rem; }
        .freq-display { display: flex; justify-content: center; gap: 5px; margin: 20px 0; }
        .digit-col { display: flex; flex-direction: column; align-items: center; }
        .digit-btn { background: #333; border: 1px solid var(--accent); color: var(--accent); width: 45px; height: 40px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
        .digit-val { font-size: 2rem; font-weight: bold; margin: 10px 0; width: 45px; }
        .unit { font-size: 1.5rem; align-self: flex-end; margin-bottom: 15px; margin-left: 5px; }
        .main-btn { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; margin-bottom: 20px; color: #000; }
        .main-btn:disabled { background: #555; opacity: 0.6; }
        .answer-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .ans-btn { padding: 15px 0; font-size: 1.2rem; background: #444; border: 1px solid #666; color: #fff; border-radius: 8px; cursor: pointer; }
        #result { font-size: 5rem; margin-top: 20px; height: 6rem; font-weight: bold; }
        .status { font-size: 1rem; color: #aaa; margin-top: 5px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hearing Tester</h1>
        
        <div class="freq-display" id="freqControls"></div>

        <button id="startBtn" class="main-btn">テスト開始 (音が鳴ります)</button>

        <div class="status" id="statusMsg">周波数を決めて開始してください</div>
        <div class="answer-group">
            <button class="ans-btn" onclick="checkAnswer(1)">1</button>
            <button class="ans-btn" onclick="checkAnswer(2)">2</button>
            <button class="ans-btn" onclick="checkAnswer(3)">3</button>
            <button class="ans-btn" onclick="checkAnswer(4)">4</button>
            <button class="ans-btn" onclick="checkAnswer(5)">5</button>
        </div>

        <div id="result"></div>
    </div>

<script>
    let audioCtx = null;
    let currentFreq = 1000;
    let correctCount = 0;
    let isTesting = false;

    const freqControls = document.getElementById('freqControls');
    const startBtn = document.getElementById('startBtn');
    const resultEl = document.getElementById('result');
    const statusMsg = document.getElementById('statusMsg');

    // 初期表示
    function updateDisplay() {
        freqControls.innerHTML = '';
        const sFreq = currentFreq.toString().padStart(5, '0');
        const digits =;
        
        digits.forEach((d, i) => {
            const col = document.createElement('div');
            col.className = 'digit-col';
            col.innerHTML = `
                <button class="digit-btn" onclick="modifyFreq(${d})">▲</button>
                <div class="digit-val">${sFreq[i]}</div>
                <button class="digit-btn" onclick="modifyFreq(${-d})">▼</button>
            `;
            freqControls.appendChild(col);
        });
        freqControls.insertAdjacentHTML('beforeend', '<div class="unit">Hz</div>');
    }

    window.modifyFreq = (amount) => {
        if (isTesting) return;
        currentFreq = Math.min(Math.max(currentFreq + amount, 20), 22000);
        updateDisplay();
        resultEl.innerText = '';
    };

    // 音声コンテキストの作成・復帰（ブラウザ対策）
    async function resumeAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
    }

    startBtn.onclick = async () => {
        if (isTesting) return;
        await resumeAudio(); // ここでユーザー操作による有効化を確実にする
        
        isTesting = true;
        startBtn.disabled = true;
        resultEl.innerText = '';
        statusMsg.innerText = '再生中...';
        
        correctCount = Math.floor(Math.random() * 5) + 1;
        
        const duration = 0.2;
        const totalWindow = 3.0;
        let times = [];
        for(let i=0; i<correctCount; i++) {
            times.push(Math.random() * (totalWindow - duration));
        }
        times.sort((a, b) => a - b);

        const now = audioCtx.currentTime;
        times.forEach(t => {
            playTone(currentFreq, duration, now + 0.5 + t);
        });

        setTimeout(() => {
            isTesting = false;
            startBtn.disabled = false;
            statusMsg.innerText = '何回鳴りましたか？';
            resultEl.innerText = '？';
        }, (totalWindow + 0.5) * 1000);
    };

    function playTone(freq, dur, startTime) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
        gain.gain.setValueAtTime(0.3, startTime + dur - 0.02);
        gain.gain.linearRampToValueAtTime(0, startTime + dur);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + dur);
    }

    window.checkAnswer = async (num) => {
        if (isTesting || correctCount === 0) return;
        await resumeAudio(); 

        if (num === correctCount) {
            resultEl.innerText = '○';
            resultEl.style.color = '#00ffcc';
            playFeedback(true);
        } else {
            resultEl.innerText = '×';
            resultEl.style.color = '#ff4444';
            playFeedback(false);
        }
        correctCount = 0; 
        statusMsg.innerText = 'テスト完了';
    };

    function playFeedback(isCorrect) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (isCorrect) {
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.setValueAtTime(1174, now + 0.15);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }

    updateDisplay();
</script>
</body>
</html>
