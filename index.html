<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳の感度測定テスト</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f0f2f5; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .freq-setter { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; gap: 5px; }
        .digit-col { display: flex; flex-direction: column; align-items: center; }
        .digit-val { font-size: 2.2rem; font-weight: bold; width: 45px; background: #eee; margin: 5px 0; border-radius: 5px; line-height: 50px; }
        .arrow-btn { width: 45px; height: 40px; cursor: pointer; border: none; background: #007AFF; color: white; border-radius: 5px; font-size: 1.2rem; }
        .arrow-btn:hover { background: #0056b3; }
        .unit { font-size: 1.5rem; margin-left: 10px; align-self: flex-end; padding-bottom: 10px; }

        #start-test { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: #34C759; color: white; border: none; border-radius: 30px; margin-bottom: 20px; width: 100%; transition: 0.3s; }
        #start-test:disabled { background: #ccc; cursor: not-allowed; }
        #start-test.playing { background: #ff3b30; animation: blink 0.6s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .answer-section { margin-top: 20px; opacity: 0; pointer-events: none; transition: 0.5s; }
        .answer-section.visible { opacity: 1; pointer-events: auto; }
        .answer-btns { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .ans-btn { width: 50px; height: 50px; font-size: 1.2rem; cursor: pointer; border: 2px solid #007AFF; background: white; border-radius: 50%; color: #007AFF; }
        .ans-btn:hover { background: #007AFF; color: white; }

        #result-display { font-size: 4rem; font-weight: bold; margin-top: 20px; height: 80px; }
        #status-msg { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>耳の感度測定テスト</h2>
    <div id="status-msg">周波数を設定して開始ボタンを押してください</div>
    
    <div class="freq-setter" id="freq-controls">
        </div>

    <button id="start-test">テスト音を再生 (3秒間)</button>

    <div class="answer-section" id="answer-ui">
        <p>音は何回鳴りましたか？</p>
        <div class="answer-btns">
            <button class="ans-btn" onclick="checkAnswer(1)">1</button>
            <button class="ans-btn" onclick="checkAnswer(2)">2</button>
            <button class="ans-btn" onclick="checkAnswer(3)">3</button>
            <button class="ans-btn" onclick="checkAnswer(4)">4</button>
            <button class="ans-btn" onclick="checkAnswer(5)">5</button>
        </div>
    </div>

    <div id="result-display"></div>
</div>

<script>
    let audioCtx = null;
    let currentTargetCount = 0;
    let digits =; // 01000 Hz

    // UIの生成を確実に行う
    function initUI() {
        const freqControls = document.getElementById('freq-controls');
        freqControls.innerHTML = '';
        digits.forEach((val, idx) => {
            const col = document.createElement('div');
            col.className = 'digit-col';
            col.innerHTML = `
                <button class="arrow-btn" onclick="changeDigit(${idx}, 1)">▲</button>
                <div class="digit-val" id="d-${idx}">${val}</div>
                <button class="arrow-btn" onclick="changeDigit(${idx}, -1)">▼</button>
            `;
            freqControls.appendChild(col);
        });
        const unit = document.createElement('div');
        unit.className = 'unit';
        unit.textContent = 'Hz';
        freqControls.appendChild(unit);
    }

    function changeDigit(idx, delta) {
        digits[idx] = (digits[idx] + delta + 10) % 10;
        document.getElementById(`d-${idx}`).textContent = digits[idx];
    }

    function getFrequency() {
        return parseInt(digits.join(''), 10);
    }

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        // 中断されている場合は再開させる（ブラウザ制限対策）
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
    }

    document.getElementById('start-test').onclick = async function() {
        await initAudio();
        const freq = getFrequency();
        
        if (freq < 20 || freq > 22000) {
            alert("20Hz〜22000Hzの範囲で設定してください。");
            return;
        }

        const btn = this;
        const ansUI = document.getElementById('answer-ui');
        const resDisp = document.getElementById('result-display');

        // 状態リセット
        currentTargetCount = Math.floor(Math.random() * 5) + 1;
        ansUI.classList.remove('visible');
        resDisp.textContent = '';
        btn.disabled = true;
        btn.classList.add('playing');
        btn.textContent = "再生中...";

        const startTime = audioCtx.currentTime + 0.2;
        const duration = 0.2;
        const interval = 0.55; // 3秒以内に収まる間隔

        for (let i = 0; i < currentTargetCount; i++) {
            playTone(freq, startTime + (i * interval), duration);
        }

        // 3秒後に回答UIを表示
        setTimeout(() => {
            btn.classList.remove('playing');
            btn.textContent = "テスト音を再生 (3秒間)";
            btn.disabled = false;
            ansUI.classList.add('visible');
        }, 3000);
    };

    function playTone(freq, start, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);

        // フェードイン・アウト（エンベロープ）
        const fade = 0.01; 
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.3, start + fade); 
        gain.gain.setValueAtTime(0.3, start + dur - fade);
        gain.gain.linearRampToValueAtTime(0, start + dur);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + dur);
    }

    function checkAnswer(userChoice) {
        const display = document.getElementById('result-display');
        if (userChoice === currentTargetCount) {
            display.textContent = '○';
            display.style.color = '#34C759';
            playFeedback(true);
        } else {
            display.textContent = '×';
            display.style.color = '#FF3B30';
            playFeedback(false);
        }
        document.getElementById('answer-ui').classList.remove('visible');
    }

    function playFeedback(isCorrect) {
        const now = audioCtx.currentTime;
        if (isCorrect) {
            // 正解音 (ピンポン)
            playSimpleTone(659.25, now, 0.1);
            playSimpleTone(880.00, now + 0.1, 0.3);
        } else {
            // 不正解音 (ブブー)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.5);
        }
    }

    function playSimpleTone(freq, start, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.1, start);
        gain.gain.exponentialRampToValueAtTime(0.01, start + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(start); osc.stop(start + dur);
    }

    // ページ読み込み完了時に実行
    window.onload = initUI;
</script>

</body>
</html>
