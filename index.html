<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Sensitivity Tester</title>
    <style>
        :root { --accent: #00ffcc; --error: #ff4444; --bg: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        
        .container { width: 95%; max-width: 500px; text-align: center; padding: 20px; }
        h1 { color: var(--accent); font-size: 1.5rem; }

        /* 周波数入力エリア */
        .freq-display { display: flex; justify-content: center; gap: 5px; margin: 20px 0; }
        .digit-col { display: flex; flex-direction: column; align-items: center; }
        .digit-btn { background: #333; border: 1px solid var(--accent); color: var(--accent); width: 45px; height: 40px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
        .digit-btn:active { background: var(--accent); color: #000; }
        .digit-val { font-size: 2rem; font-weight: bold; margin: 10px 0; width: 45px; }
        .unit { font-size: 1.5rem; align-self: flex-end; margin-bottom: 15px; margin-left: 5px; }

        /* コントロール */
        .main-btn { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; margin-bottom: 20px; color: #000; }
        .main-btn:disabled { background: #555; cursor: not-allowed; }

        /* 回答ボタン */
        .answer-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .ans-btn { padding: 15px 0; font-size: 1.2rem; background: #444; border: 1px solid #666; color: #fff; border-radius: 8px; cursor: pointer; }
        .ans-btn:active { background: #666; }

        /* 結果表示 */
        #result { font-size: 4rem; margin-top: 20px; height: 6rem; transition: 0.3s; }
        .status { font-size: 1rem; color: #aaa; margin-top: 5px; }
        
        .footer-note { font-size: 0.8rem; color: #777; margin-top: 30px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hearing Tester</h1>
        
        <div class="freq-display" id="freqControls">
            </div>

        <button id="startBtn" class="main-btn">テスト開始 (音が鳴ります)</button>

        <div class="status" id="statusMsg">回答を選択してください</div>
        <div class="answer-group">
            <button class="ans-btn" onclick="checkAnswer(1)">1</button>
            <button class="ans-btn" onclick="checkAnswer(2)">2</button>
            <button class="ans-btn" onclick="checkAnswer(3)">3</button>
            <button class="ans-btn" onclick="checkAnswer(4)">4</button>
            <button class="ans-btn" onclick="checkAnswer(5)">5</button>
        </div>

        <div id="result"></div>
    </div>

    <div class="footer-note">
        ※ 20Hz〜22,000Hzの範囲で設定可能です。<br>
        3秒間の間にランダムな回数（1〜5回）音が鳴ります。
    </div>

<script>
    let audioCtx;
    let currentFreq = 1000;
    let correctCount = 0;
    let isTesting = false;

    // 初期化：桁ごとのコントローラー生成
    const freqControls = document.getElementById('freqControls');
    const digits =;
    
    function updateDisplay() {
        freqControls.innerHTML = '';
        const sFreq = currentFreq.toString().padStart(5, '0');
        
        digits.forEach((d, i) => {
            const col = document.createElement('div');
            col.className = 'digit-col';
            
            const up = document.createElement('button');
            up.className = 'digit-btn';
            up.innerText = '▲';
            up.onclick = () => modifyFreq(d);
            
            const val = document.createElement('div');
            val.className = 'digit-val';
            val.innerText = sFreq[i];
            
            const down = document.createElement('button');
            down.className = 'digit-btn';
            down.innerText = '▼';
            down.onclick = () => modifyFreq(-d);
            
            col.appendChild(up);
            col.appendChild(val);
            col.appendChild(down);
            freqControls.appendChild(col);
        });
        const unit = document.createElement('div');
        unit.className = 'unit';
        unit.innerText = 'Hz';
        freqControls.appendChild(unit);
    }

    function modifyFreq(amount) {
        if (isTesting) return;
        currentFreq += amount;
        if (currentFreq < 20) currentFreq = 20;
        if (currentFreq > 22000) currentFreq = 22000;
        updateDisplay();
        document.getElementById('result').innerText = '';
    }

    // テスト実行ロジック
    document.getElementById('startBtn').onclick = async () => {
        if (isTesting) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        isTesting = true;
        correctCount = Math.floor(Math.random() * 5) + 1;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('result').innerText = '...';
        document.getElementById('statusMsg').innerText = '再生中...';

        const duration = 0.2;
        const totalWindow = 3.0;
        
        // 3秒間の枠の中にランダムなタイミングを生成
        let times = [];
        for(let i=0; i<correctCount; i++) {
            times.push(Math.random() * (totalWindow - duration));
        }
        times.sort((a, b) => a - b);

        const startTime = audioCtx.currentTime + 0.5;
        times.forEach(t => {
            playTone(currentFreq, duration, startTime + t);
        });

        setTimeout(() => {
            isTesting = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('statusMsg').innerText = '何回鳴りましたか？';
            document.getElementById('result').innerText = '？';
        }, (totalWindow + 0.5) * 1000);
    };

    function playTone(freq, dur, start) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        
        // プツプツ音を防ぐためのエンベロープ
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.5, start + 0.02);
        gain.gain.setValueAtTime(0.5, start + dur - 0.02);
        gain.gain.linearRampToValueAtTime(0, start + dur);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(start);
        osc.stop(start + dur);
    }

    // 正解・不正解判定
    function checkAnswer(num) {
        if (isTesting || correctCount === 0) return;
        
        const resultEl = document.getElementById('result');
        if (num === correctCount) {
            resultEl.innerText = '○';
            resultEl.style.color = varColor('--accent');
            playFeedback(true);
        } else {
            resultEl.innerText = '×';
            resultEl.style.color = varColor('--error');
            playFeedback(false);
        }
        correctCount = 0; // 連続回答防止
        document.getElementById('statusMsg').innerText = 'テスト完了';
    }

    // 効果音合成
    function playFeedback(isCorrect) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (isCorrect) {
            // ピンポン♪（高い2音）
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.setValueAtTime(1174, now + 0.15);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else {
            // ブブー！（低い濁った音）
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0.1, now + 0.3);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name);
    }

    updateDisplay();
</script>
</body>
</html>
