<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearing Sensitivity Tester Pro</title>
    <style>
        :root { --accent: #00ffcc; --sub: #ff00ff; --error: #ff4444; --bg: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .container { width: 95%; max-width: 500px; text-align: center; padding: 20px; }
        
        /* 状態表示エリア */
        .monitor { background: #000; border: 2px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 20px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; transition: 0.2s; }
        .monitor.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        #statusMsg { font-size: 1rem; color: #aaa; margin-bottom: 5px; }
        #playingFreq { font-size: 1.8rem; font-weight: bold; color: var(--accent); visibility: hidden; }
        .monitor.playing #playingFreq { visibility: visible; }

        /* 周波数設定 */
        .freq-display { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 12px; }
        .digit-col { display: flex; flex-direction: column; align-items: center; }
        .digit-btn { background: #444; border: none; color: #fff; width: 42px; height: 40px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; margin: 2px; }
        .digit-btn:active { background: var(--accent); color: #000; }
        .digit-val { font-size: 1.8rem; font-weight: bold; margin: 5px 0; width: 42px; }
        .unit { font-size: 1.2rem; align-self: flex-end; margin-bottom: 12px; margin-left: 5px; color: #888; }

        /* ボタン類 */
        .main-btn { width: 100%; padding: 18px; font-size: 1.3rem; font-weight: bold; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; margin-bottom: 25px; color: #000; box-shadow: 0 4px 0 #008866; }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #008866; }
        .main-btn:disabled { background: #555; box-shadow: none; opacity: 0.5; transform: none; }

        .answer-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .ans-btn { padding: 15px 0; font-size: 1.2rem; background: #333; border: 1px solid #555; color: #fff; border-radius: 8px; cursor: pointer; }
        .ans-btn:hover { background: #444; }

        #result { font-size: 5rem; font-weight: bold; margin-top: 10px; height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color:var(--accent); margin: 10px 0;">Hearing Tester</h2>
        
        <div class="monitor" id="monitorBox">
            <div id="statusMsg">待機中</div>
            <div id="playingFreq">READY</div>
        </div>

        <div class="freq-display" id="freqControls"></div>

        <button id="startBtn" class="main-btn">テスト開始</button>

        <div class="answer-group">
            <button class="ans-btn" onclick="checkAnswer(1)">1</button>
            <button class="ans-btn" onclick="checkAnswer(2)">2</button>
            <button class="ans-btn" onclick="checkAnswer(3)">3</button>
            <button class="ans-btn" onclick="checkAnswer(4)">4</button>
            <button class="ans-btn" onclick="checkAnswer(5)">5</button>
        </div>

        <div id="result"></div>
    </div>

<script>
    let audioCtx = null;
    let currentFreq = 1000;
    let correctCount = 0;
    let isTesting = false;

    const monitorBox = document.getElementById('monitorBox');
    const statusMsg = document.getElementById('statusMsg');
    const playingFreq = document.getElementById('playingFreq');
    const startBtn = document.getElementById('startBtn');
    const resultEl = document.getElementById('result');

    // 初期表示の生成
    function updateDisplay() {
        const freqControls = document.getElementById('freqControls');
        freqControls.innerHTML = '';
        const sFreq = currentFreq.toString().padStart(5, '0');
        const digits =;
        
        digits.forEach((d, i) => {
            const col = document.createElement('div');
            col.className = 'digit-col';
            col.innerHTML = `
                <button class="digit-btn" onclick="modifyFreq(${d})">▲</button>
                <div class="digit-val">${sFreq[i]}</div>
                <button class="digit-btn" onclick="modifyFreq(${-d})">▼</button>
            `;
            freqControls.appendChild(col);
        });
        freqControls.insertAdjacentHTML('beforeend', '<div class="unit">Hz</div>');
    }

    window.modifyFreq = (amount) => {
        if (isTesting) return;
        currentFreq = Math.min(Math.max(currentFreq + amount, 20), 22000);
        updateDisplay();
        resultEl.innerText = '';
        playingFreq.innerText = "READY";
    };

    // 音声の初期化（重要：ユーザーのクリック時に実行）
    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
    }

    startBtn.onclick = async () => {
        if (isTesting) return;
        await initAudio();
        
        isTesting = true;
        startBtn.disabled = true;
        resultEl.innerText = '';
        monitorBox.classList.add('active');
        
        correctCount = Math.floor(Math.random() * 5) + 1;
        const duration = 0.2;
        const totalWindow = 3.0;

        // ランダムな発火時間を生成
        let times = [];
        for(let i=0; i<correctCount; i++) {
            times.push(Math.random() * (totalWindow - duration));
        }
        times.sort((a, b) => a - b);

        const now = audioCtx.currentTime;
        times.forEach((t, index) => {
            const startTime = now + 0.5 + t;
            playTone(currentFreq, duration, startTime);
            
            // 視覚的な「再生中」表示の同期
            setTimeout(() => {
                statusMsg.innerText = "● 再生中...";
                statusMsg.style.color = "var(--accent)";
                playingFreq.innerText = `${currentFreq} Hz`;
                monitorBox.style.background = "#002211";
                monitorBox.classList.add('playing');
            }, (0.5 + t) * 1000);

            // 音が終わったら表示を戻す
            setTimeout(() => {
                statusMsg.innerText = "待機中...";
                statusMsg.style.color = "#aaa";
                monitorBox.style.background = "#000";
                monitorBox.classList.remove('playing');
            }, (0.5 + t + duration) * 1000);
        });

        setTimeout(() => {
            isTesting = false;
            startBtn.disabled = false;
            statusMsg.innerText = "回答してください";
            playingFreq.innerText = "？ 回";
            monitorBox.classList.remove('active');
        }, (totalWindow + 0.6) * 1000);
    };

    function playTone(freq, dur, startTime) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // わずかに角を丸めたサイン波
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        
        // 音量調整（前回より大きく）
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.8, startTime + 0.01);
        gain.gain.setValueAtTime(0.8, startTime + dur - 0.01);
        gain.gain.linearRampToValueAtTime(0, startTime + dur);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + dur);
    }

    window.checkAnswer = async (num) => {
        if (isTesting || correctCount === 0) return;
        await initAudio();

        if (num === correctCount) {
            resultEl.innerText = '○';
            resultEl.style.color = 'var(--accent)';
            playFeedback(true);
        } else {
            resultEl.innerText = '×';
            resultEl.style.color = 'var(--error)';
            playFeedback(false);
        }
        correctCount = 0; 
        statusMsg.innerText = "テスト完了";
        playingFreq.innerText = "---";
    };

    function playFeedback(isCorrect) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (isCorrect) {
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.setTargetAtTime(1320, now + 0.1, 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }

    updateDisplay();
</script>
</body>
</html>
